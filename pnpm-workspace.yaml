packages:
  - packages/*
  - widgets/*
  - widgets/mantine/*
  - modules/*

allowBuilds:
  '@parcel/watcher': true
  core-js: true
  esbuild: true

catalog:
  '@eslint/js': ^9.32.0
  '@mantine/core': 9.4.1
  '@mantine/hooks': 9.4.1
  '@prettier/plugin-xml': ^3.4.2
  '@types/big.js': ^6.2.2
  '@types/jest': ^29.5.14
  '@types/node': ^22.13.10
  '@types/react': ^19.0.0
  classnames: ^2.5.1
  eslint: ^9.32.0
  lucide-react: ^1.23.0
  mendix: ^10.21.2
  prettier: ^3.6.2
  react: ^19.0.0
  react-dom: ^19.0.0

enableGlobalVirtualStore: false

overrides:
  '@types/big.js': 'catalog:'
  '@types/jest': 'catalog:'
  '@types/node': 'catalog:'
  '@types/react': 'catalog:'
  mpx: file:pkg/mendix-mpx-0.1.2.tgz
  react: 'catalog:'
  react-dom: 'catalog:'

publicHoistPattern:
  - '*prettier*'
  - '@types/big.js'
  - '@types/jest'
  - '@types/node'
  - '@types/react'

widget:
  id: com.mendix.finch.widget.pininput.PinInput
  name: PinInput
  description: Capture a PIN or verification code from the user
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Value
        description: String attribute to capture and display
        attributeTypes: [String]
      length:
        type: integer
        required: true
        default: 4
        caption: Length
        description: Number of inputs
      type:
        type: enumeration
        required: true
        default: alphanumeric
        caption: Type
        description: Determines which values can be entered
        enumerationValues:
          alphanumeric: Alphanumeric
          number: Number
      mask:
        type: boolean
        required: true
        default: false
        caption: Mask
        description: Changes input type to password, hiding entered characters
      placeholder:
        type: string
        required: true
        default: "○"
        caption: Placeholder
        description: Placeholder shown in each empty input
      oneTimeCode:
        type: boolean
        required: true
        default: false
        caption: One Time Code
        description: Sets autocomplete="one-time-code" attribute on all inputs
      disabled:
        type: boolean
        required: true
        default: false
        caption: Disabled
        description: Disables all inputs. The inputs are also disabled when the value attribute is read-only.
    Appearance:
      size:
        type: enumeration
        required: true
        default: sm
        caption: Size
        description: Controls inputs width and height
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: sm
        caption: Radius
        description: Border radius of the inputs
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed when the value changes
      onComplete:
        type: action
        required: false
        caption: On Complete
        description: Action executed when all inputs have a value

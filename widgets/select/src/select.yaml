widget:
  id: com.mendix.finch.widget.select.Select
  name: Select
  description: Pick a single option from a dropdown backed by a data source
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      value:
        type: attribute
        caption: Value
        description: Attribute that stores the value of the selected option
        attributeTypes: [String]
      optionsSource:
        type: datasource
        isList: true
        caption: Options
        description: Data source providing the selectable options
      optionValue:
        type: attribute
        dataSource: optionsSource
        caption: Option value
        description: Attribute on each option holding its value (matched against Value)
        attributeTypes: [String]
      optionLabel:
        type: textTemplate
        dataSource: optionsSource
        caption: Option label
        description: Text shown for each option in the dropdown
      label:
        type: string
        required: false
        caption: Label
        description: Label displayed above the input
      description:
        type: string
        required: false
        caption: Description
        description: Helper text displayed below the label
      placeholder:
        type: string
        required: false
        caption: Placeholder
        description: Placeholder shown when nothing is selected
      required:
        type: boolean
        required: true
        default: false
        caption: Required
        description: Displays a red asterisk next to the label
      disabled:
        type: boolean
        required: true
        default: false
        caption: Disabled
        description: Disables the input. Also disabled when the value attribute is read-only.
    Behavior:
      searchable:
        type: boolean
        required: true
        default: false
        caption: Searchable
        description: Allows filtering options by typing
      clearable:
        type: boolean
        required: true
        default: false
        caption: Clearable
        description: Shows a clear button to reset the selection
    Appearance:
      size:
        type: enumeration
        required: true
        default: sm
        caption: Size
        description: Controls input height and horizontal padding
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: sm
        caption: Radius
        description: Border radius of the input
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed when the selection changes

widget:
  id: com.mendix.finch.widget.numberinput.NumberInput
  name: NumberInput
  description: Capture a number from the user
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Value
        description: Numeric attribute to capture and display
        attributeTypes: [Decimal, Long, Integer]
      label:
        type: string
        required: false
        caption: Label
        description: Label displayed above the input
      description:
        type: string
        required: false
        caption: Description
        description: Helper text displayed below the label
      placeholder:
        type: string
        required: false
        caption: Placeholder
        description: Placeholder shown when the input is empty
      required:
        type: boolean
        required: true
        default: false
        caption: Required
        description: Displays a red asterisk next to the label
      disabled:
        type: boolean
        required: true
        default: false
        caption: Disabled
        description: Disables the input. The input is also disabled when the value attribute is read-only.
    Number format:
      min:
        type: expression
        required: false
        returnType: Decimal
        caption: Min
        description: Minimum possible value. Leave empty for no minimum.
      max:
        type: expression
        required: false
        returnType: Decimal
        caption: Max
        description: Maximum possible value. Leave empty for no maximum.
      step:
        type: integer
        required: true
        default: 1
        caption: Step
        description: Amount to increment/decrement with the controls and arrow keys
      clampBehavior:
        type: enumeration
        required: true
        default: blur
        caption: Clamp Behavior
        description: How the value is clamped to the min/max range
        enumerationValues:
          none: None
          blur: On blur
          strict: Strict
      allowDecimal:
        type: boolean
        required: true
        default: true
        caption: Allow Decimal
        description: If set, decimal values are allowed
      decimalScale:
        type: expression
        required: false
        returnType: Integer
        caption: Decimal Scale
        description: Limits the number of digits after the decimal point. Leave empty for no limit.
      fixedDecimalScale:
        type: boolean
        required: true
        default: false
        caption: Fixed Decimal Scale
        description: If set, trailing zeros are added to match the decimal scale
      allowNegative:
        type: boolean
        required: true
        default: true
        caption: Allow Negative
        description: If set, negative values are allowed
      thousandSeparator:
        type: boolean
        required: true
        default: false
        caption: Thousand Separator
        description: If set, thousands are grouped with a separator
      prefix:
        type: string
        required: false
        caption: Prefix
        description: Text added before the input value (e.g. "$")
      suffix:
        type: string
        required: false
        caption: Suffix
        description: Text added after the input value (e.g. " %")
      hideControls:
        type: boolean
        required: true
        default: false
        caption: Hide Controls
        description: If set, the up/down controls are hidden
    Appearance:
      size:
        type: enumeration
        required: true
        default: sm
        caption: Size
        description: Controls input height and horizontal padding
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: sm
        caption: Radius
        description: Border radius of the input
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed after the value changes

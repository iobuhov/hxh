widget:
  id: com.mendix.finch.widget.navlink.NavLink
  name: NavLink
  description: Navigation link with icon support
  pluginWidget: true
  offlineCapable: false
  studioProCategory: Finch

  properties:
    General:
      label:
        type: string
        caption: Label
        description: Main link label
        required: false

      description:
        type: string
        caption: Description
        description: Link description, displayed below the label
        required: false

      disabled:
        type: boolean
        caption: Disabled
        description: If set, disabled styles will be added
        required: true
        default: "false"

      href:
        type: string
        caption: Href
        description: URL for anchor element (only used when component is "a")
        required: false

      componentType:
        type: enumeration
        caption: Component Type
        description: "Root element type: anchor or button"
        required: true
        default: anchor
        enumerationValues:
          anchor: Anchor (a)
          button: Button

      onClick:
        type: action
        caption: On Click
        description: Action triggered when the link is clicked
        required: false

    Icon:
      icon:
        type: string
        caption: Icon
        description: Lucide icon name (e.g. "layout-dashboard", "settings")
        required: false

      iconSize:
        type: integer
        caption: Icon Size
        description: Icon size in pixels
        required: true
        default: "20"

      iconStrokeWidth:
        type: string
        caption: Icon Stroke Width
        description: Icon stroke width
        required: false
        default: "2"

    Appearance:
      variant:
        type: enumeration
        caption: Variant
        description: Controls active link appearance
        required: true
        default: filled
        enumerationValues:
          filled: Filled
          light: Light
          subtle: Subtle

      color:
        type: string
        caption: Color
        description: Key of theme.colors or any valid CSS color for active styles
        required: false

      noWrap:
        type: boolean
        caption: No Wrap
        description: If set, label and description are truncated with ellipsis
        required: true
        default: "false"

      autoContrast:
        type: boolean
        caption: Auto Contrast
        description: Adjusts text color based on background for filled variant
        required: true
        default: "false"

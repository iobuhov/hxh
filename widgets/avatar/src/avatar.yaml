widget:
  id: com.mendix.finch.widget.avatar.Avatar
  name: Avatar
  description: Display a user profile image, initials or a fallback icon
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch
  studioCategory: Finch
  properties:
    General:
      src:
        type: textTemplate
        required: false
        caption: Image source
        description: URL of the image to display. If empty, initials or a fallback icon are shown.
      userName:
        type: string
        required: false
        caption: Name
        description: Used as the alt text and to derive initials when no image is set
    Appearance:
      size:
        type: string
        required: false
        default: md
        caption: Size
        description: Key of theme sizes (xs–xl) or a number of pixels
      radius:
        type: string
        required: false
        caption: Radius
        description: Key of theme.radius, a CSS value, or a percentage. Leave empty for a circular avatar.
      color:
        type: string
        required: false
        caption: Color
        description: Placeholder/initials color. Use "initials" for a color derived from the name.

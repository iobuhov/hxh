widget:
  id: com.mendix.finch.widget.table.Table
  name: Table
  description: Data source driven table with headers and per-column cell templates
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  studioProCategory: Finch / Data
  studioCategory: Finch / Data
  properties:
    General:
      datasource:
        type: datasource
        isList: true
        caption: Data source
        description: List of rows shown in the table
      columns:
        type: object
        isList: true
        required: false
        caption: Columns
        description: Columns rendered in the table
        properties:
          General:
            header:
              type: string
              required: false
              caption: Header
              description: Text shown in the column header cell
            content:
              type: widgets
              dataSource: ../datasource
              required: false
              caption: Content
              description: Widgets rendered in the cell for each row
            textAlign:
              type: enumeration
              required: true
              default: left
              caption: Text align
              description: Horizontal alignment of the header and cell content
              enumerationValues:
                left: Left
                center: Center
                right: Right
            width:
              type: string
              required: false
              caption: Width
              description: Optional fixed column width as a CSS value
    Appearance:
      withTableBorder:
        type: boolean
        required: true
        default: true
        caption: With table border
        description: If set, the table has the outer border
      withColumnBorders:
        type: boolean
        required: true
        default: false
        caption: With column borders
        description: If set, the table has borders between columns
      withRowBorders:
        type: boolean
        required: true
        default: true
        caption: With row borders
        description: If set, the table has borders between rows
      striped:
        type: boolean
        required: true
        default: false
        caption: Striped
        description: If set, every odd row background changes to the striped color
      highlightOnHover:
        type: boolean
        required: true
        default: true
        caption: Highlight on hover
        description: If set, table rows background changes when hovered
      stickyHeader:
        type: boolean
        required: true
        default: false
        caption: Sticky header
        description: If set, the table header is sticky
      horizontalSpacing:
        type: string
        required: false
        default: sm
        caption: Horizontal spacing
        description: Horizontal cells spacing, key of theme spacing or any valid CSS value
      verticalSpacing:
        type: string
        required: false
        default: sm
        caption: Vertical spacing
        description: Vertical cells spacing, key of theme spacing or any valid CSS value

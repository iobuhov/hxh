widget:
  id: com.mendix.finch.widget.Alert
  name: Alert
  description: Attract user attention with an important static message
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  studioProCategory: Finch / Feedback
  studioCategory: Finch / Feedback
  properties:
    General:
      title:
        type: string
        required: false
        caption: Title
        description: Alert title displayed above the message
      message:
        type: string
        required: true
        caption: Message
        description: Alert body text
    Appearance:
      color:
        type: enumeration
        required: true
        default: blue
        caption: Color
        description: Alert color
        enumerationValues:
          gray: Gray
          red: Red
          pink: Pink
          grape: Grape
          violet: Violet
          indigo: Indigo
          blue: Blue
          cyan: Cyan
          teal: Teal
          green: Green
          lime: Lime
          yellow: Yellow
          orange: Orange
      variant:
        type: enumeration
        required: true
        default: light
        caption: Variant
        description: Visual style of the alert
        enumerationValues:
          default: Default
          light: Light
          filled: Filled
          outline: Outline
      radius:
        type: enumeration
        required: true
        default: sm
        caption: Radius
        description: Border radius of the alert
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      withCloseButton:
        type: boolean
        required: true
        default: false
        caption: With Close Button
        description: Determines whether a close button should be displayed
    Events:
      onClose:
        type: action
        required: false
        caption: On Close
        description: Action executed when the close button is clicked

widget:
  id: com.mendix.finch.widget.progress.Progress
  name: Progress
  description: Display a horizontal progress bar
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Feedback
  studioCategory: Finch / Feedback
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Value
        description: Numeric attribute (0-100) representing the progress
        attributeTypes: [Decimal, Long, Integer]
      striped:
        type: boolean
        required: true
        default: false
        caption: Striped
        description: If set, the bar is displayed with stripes
      animated:
        type: boolean
        required: true
        default: false
        caption: Animated
        description: If set, the stripes are animated (implies striped)
    Appearance:
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color for the bar
      size:
        type: enumeration
        required: true
        default: md
        caption: Size
        description: Controls track height
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: md
        caption: Radius
        description: Border radius of the track
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large

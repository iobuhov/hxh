widget:
  id: com.mendix.finch.widget.tabs.Tabs
  name: Tabs
  description: Tabs container that provides context for TabsList and TabPanel widgets
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Navigation
  studioCategory: Finch / Navigation
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Active tab
        description: String attribute holding the value of the currently active tab
        attributeTypes: [String]
      content:
        type: widgets
        required: false
        caption: Content
        description: Place a TabsList and the TabPanel widgets here
    Appearance:
      variant:
        type: enumeration
        required: true
        default: default
        caption: Variant
        description: Visual variant of the tabs
        enumerationValues:
          default: Default
          outline: Outline
          pills: Pills
      orientation:
        type: enumeration
        required: true
        default: horizontal
        caption: Orientation
        description: Tabs orientation
        enumerationValues:
          horizontal: Horizontal
          vertical: Vertical
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color for the active tab
      radius:
        type: string
        required: false
        default: sm
        caption: Radius
        description: Key of theme.radius or any valid CSS value (used by the pills variant)
    Events:
      onTabChange:
        type: action
        required: false
        caption: On Tab Change
        description: Action executed when the active tab changes

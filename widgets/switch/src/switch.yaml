widget:
  id: com.mendix.finch.widget.switch.Switch
  name: Switch
  description: Capture a boolean value with an on/off switch
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Value
        description: Boolean attribute to capture and display
        attributeTypes: [Boolean]
      label:
        type: string
        required: false
        caption: Label
        description: Label displayed next to the switch
      description:
        type: string
        required: false
        caption: Description
        description: Helper text displayed below the label
      onLabel:
        type: string
        required: false
        caption: On Label
        description: Inner label shown when the switch is in the checked state
      offLabel:
        type: string
        required: false
        caption: Off Label
        description: Inner label shown when the switch is in the unchecked state
      disabled:
        type: boolean
        required: true
        default: false
        caption: Disabled
        description: Disables the switch. Also disabled when the value attribute is read-only.
    Appearance:
      labelPosition:
        type: enumeration
        required: true
        default: right
        caption: Label Position
        description: Position of the label relative to the switch
        enumerationValues:
          left: Left
          right: Right
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color for the checked state
      size:
        type: enumeration
        required: true
        default: sm
        caption: Size
        description: Controls size of the switch
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: xl
        caption: Radius
        description: Border radius of the switch track
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed after the value changes

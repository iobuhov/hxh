widget:
  id: com.mendix.finch.widget.rangeslider.RangeSlider
  name: RangeSlider
  description: Capture a numeric range by dragging two thumbs
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      fromValue:
        type: attribute
        required: true
        caption: From Value
        description: Numeric attribute bound to the lower thumb
        attributeTypes: [Decimal, Long, Integer]
      toValue:
        type: attribute
        required: true
        caption: To Value
        description: Numeric attribute bound to the upper thumb
        attributeTypes: [Decimal, Long, Integer]
      disabled:
        type: boolean
        required: true
        default: false
        caption: Disabled
        description: Disables the slider. Also disabled when the value attributes are read-only.
    Range:
      min:
        type: integer
        required: true
        default: 0
        caption: Min
        description: Minimum possible value
      max:
        type: integer
        required: true
        default: 100
        caption: Max
        description: Maximum possible value
      step:
        type: integer
        required: true
        default: 1
        caption: Step
        description: Amount to increment/decrement with drag and arrow keys
      minRange:
        type: integer
        required: true
        default: 10
        caption: Min Range
        description: Minimal interval between the two thumbs
    Appearance:
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color for the track and thumbs
      size:
        type: enumeration
        required: true
        default: md
        caption: Size
        description: Controls size of the track
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: xl
        caption: Radius
        description: Border radius of the track
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed each time the value changes
      onChangeEnd:
        type: action
        required: false
        caption: On Change End
        description: Action executed when the user stops dragging or changes value with arrows

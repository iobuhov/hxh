widget:
  id: com.mendix.finch.widget.themeicon.ThemeIcon
  name: ThemeIcon
  description: Render an icon inside an element with theme colors
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  studioProCategory: Finch / Data
  studioCategory: Finch / Data
  properties:
    General:
      content:
        type: widgets
        required: false
        caption: Content
        description: Icon placed inside the theme icon (e.g. a LucideIcon widget)
    Appearance:
      variant:
        type: enumeration
        required: true
        default: light
        caption: Variant
        description: Visual variant of the theme icon
        enumerationValues:
          filled: Filled
          light: Light
          outline: Outline
          default: Default
          gradient: Gradient
          transparent: Transparent
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color
      size:
        type: string
        required: false
        default: md
        caption: Size
        description: Theme size key (xs–xl) or a px number controlling width and height
      radius:
        type: string
        required: false
        default: sm
        caption: Radius
        description: Key of theme.radius or any valid CSS value to set border-radius

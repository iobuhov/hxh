widget:
  id: com.mendix.finch.widget.rating.Rating
  name: Rating
  description: Capture a rating value with a row of symbols
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Value
        description: Numeric attribute to capture and display
        attributeTypes: [Decimal, Long, Integer]
      count:
        type: integer
        required: true
        default: 5
        caption: Count
        description: Number of symbols
      fractions:
        type: integer
        required: true
        default: 1
        caption: Fractions
        description: Number of fractions each symbol can be divided into
      readOnly:
        type: boolean
        required: true
        default: false
        caption: Read Only
        description: If set, the user cannot interact with the component
    Appearance:
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color for the symbols
      size:
        type: enumeration
        required: true
        default: sm
        caption: Size
        description: Controls symbol size
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed when the value changes

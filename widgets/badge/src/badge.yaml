widget:
  id: com.mendix.finch.widget.badge.Badge
  name: Badge
  description: Display badge, pill or tag
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Data
  studioCategory: Finch / Data
  properties:
    General:
      content:
        type: textTemplate
        required: false
        caption: Content
        description: Text displayed inside the badge
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color
      fullWidth:
        type: boolean
        required: true
        default: false
        caption: Full Width
        description: If set, the badge takes 100% of its parent width
      circle:
        type: boolean
        required: true
        default: false
        caption: Circle
        description: If set, renders an icon-only round badge with equal width and height
    Appearance:
      variant:
        type: enumeration
        required: true
        default: light
        caption: Variant
        description: Controls the visual style of the badge
        enumerationValues:
          filled: Filled
          light: Light
          outline: Outline
          dot: Dot
          transparent: Transparent
          default: Default
      size:
        type: enumeration
        required: true
        default: sm
        caption: Size
        description: Controls font-size, height and horizontal padding
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: xl
        caption: Radius
        description: Border radius of the badge
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large

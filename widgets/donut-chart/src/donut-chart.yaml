widget:
  id: com.mendix.finch.widget.donutchart.DonutChart
  name: DonutChart
  description: Donut chart showing a single series of labelled segments
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Charts
  studioCategory: Finch / Charts
  properties:
    Data:
      datasource:
        type: datasource
        isList: true
        caption: Data source
        description: List of rows, one segment per row
      nameAttribute:
        type: attribute
        dataSource: datasource
        required: true
        caption: Name
        description: Attribute read per row for the segment label
        attributeTypes:
          - String
          - Enum
      valueAttribute:
        type: attribute
        dataSource: datasource
        required: true
        caption: Value
        description: Numeric attribute read per row for the segment value
        attributeTypes:
          - Integer
          - Long
          - Decimal
      colorAttribute:
        type: attribute
        dataSource: datasource
        required: true
        caption: Color
        description: Attribute read per row (theme color key e.g. blue.6 or any CSS color)
        attributeTypes:
          - String
    Appearance:
      size:
        type: integer
        required: true
        default: 160
        caption: Size
        description: Chart width and height in pixels
      thickness:
        type: integer
        required: true
        default: 20
        caption: Thickness
        description: Thickness of the chart segments in pixels
      strokeWidth:
        type: integer
        required: true
        default: 1
        caption: Stroke width
        description: Width of segments stroke in pixels
      paddingAngle:
        type: integer
        required: true
        default: 0
        caption: Padding angle
        description: Padding between segments in degrees
      startAngle:
        type: integer
        required: true
        default: 0
        caption: Start angle
        description: Angle at which the chart starts (set to 180 for a semicircle)
      endAngle:
        type: integer
        required: true
        default: 360
        caption: End angle
        description: Angle at which the chart ends (set to 0 for a semicircle)
      chartLabel:
        type: string
        required: false
        caption: Chart label
        description: Label displayed in the center of the chart
      labelsType:
        type: enumeration
        required: true
        default: value
        caption: Labels type
        description: Type of labels to display
        enumerationValues:
          value: Value
          percent: Percent
          name: Name
      tooltipDataSource:
        type: enumeration
        required: true
        default: all
        caption: Tooltip data source
        description: Which data is displayed in the tooltip
        enumerationValues:
          all: All
          segment: Segment
      withLabels:
        type: boolean
        required: true
        default: false
        caption: With labels
        description: Display a label for each segment
      withLabelsLine:
        type: boolean
        required: true
        default: true
        caption: With labels line
        description: Connect each segment to its label with a line
      withTooltip:
        type: boolean
        required: true
        default: true
        caption: With tooltip
        description: Display the chart tooltip
      withLegend:
        type: boolean
        required: true
        default: false
        caption: With legend
        description: Display the chart legend

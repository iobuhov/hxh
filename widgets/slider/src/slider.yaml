widget:
  id: com.mendix.finch.widget.slider.Slider
  name: Slider
  description: Capture a numeric value by dragging a slider
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  needsEntityContext: true
  studioProCategory: Finch / Inputs
  studioCategory: Finch / Inputs
  properties:
    General:
      value:
        type: attribute
        required: true
        caption: Value
        description: Numeric attribute to capture and display
        attributeTypes: [Decimal, Long, Integer]
      disabled:
        type: boolean
        required: true
        default: false
        caption: Disabled
        description: Disables the slider. Also disabled when the value attribute is read-only.
    Range:
      min:
        type: integer
        required: true
        default: 0
        caption: Min
        description: Minimum possible value
      max:
        type: integer
        required: true
        default: 100
        caption: Max
        description: Maximum possible value
      step:
        type: integer
        required: true
        default: 1
        caption: Step
        description: Amount to increment/decrement with drag and arrow keys
      inverted:
        type: boolean
        required: true
        default: false
        caption: Inverted
        description: If set, the track value representation is inverted
    Appearance:
      color:
        type: string
        required: false
        caption: Color
        description: Key of theme.colors or any valid CSS color for the track and thumb
      size:
        type: enumeration
        required: true
        default: md
        caption: Size
        description: Controls size of the track
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      radius:
        type: enumeration
        required: true
        default: xl
        caption: Radius
        description: Border radius of the track
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
    Events:
      onChange:
        type: action
        required: false
        caption: On Change
        description: Action executed each time the value changes
      onChangeEnd:
        type: action
        required: false
        caption: On Change End
        description: Action executed when the user stops dragging or changes value with arrows

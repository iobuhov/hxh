widget:
  id: com.mendix.finch.widget.gridcol.GridCol
  name: GridCol
  description: Grid column with configurable span
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  studioProCategory: Finch

  properties:
    General:
      children:
        type: widgets
        caption: Content
        description: Column content
        required: false

      span:
        type: string
        caption: Span
        description: "Columns to span: number (1-12), 'auto', or 'content'"
        required: false
        default: auto

      offset:
        type: integer
        caption: Offset
        description: Number of columns to offset from the start
        default: "0"

      order:
        type: integer
        caption: Order
        description: CSS order property for column reordering
        default: "0"

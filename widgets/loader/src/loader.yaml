widget:
  id: com.mendix.finch.widget.Loader
  name: Loader
  description: Indicate a loading state
  pluginWidget: true
  offlineCapable: true
  supportedPlatform: Web
  studioProCategory: Finch / Feedback
  studioCategory: Finch / Feedback
  properties:
    General:
      type:
        type: enumeration
        required: true
        default: oval
        caption: Type
        description: Loader animation type
        enumerationValues:
          oval: Oval
          bars: Bars
          dots: Dots
    Appearance:
      size:
        type: enumeration
        required: true
        default: md
        caption: Size
        description: Controls width and height of the loader
        enumerationValues:
          xs: Extra small
          sm: Small
          md: Medium
          lg: Large
          xl: Extra large
      color:
        type: enumeration
        required: true
        default: blue
        caption: Color
        description: Loader color
        enumerationValues:
          gray: Gray
          red: Red
          pink: Pink
          grape: Grape
          violet: Violet
          indigo: Indigo
          blue: Blue
          cyan: Cyan
          teal: Teal
          green: Green
          lime: Lime
          yellow: Yellow
          orange: Orange
